{% extends "core/base.html" %}

{% block title %}Password updated · Transaction Hub{% endblock %}

{% block unauthenticated_content %}
<div style="max-width: 400px; margin: 60px auto;">
    <div style="background: var(--bg-content); border-radius: 8px; padding: 32px; border: 1px solid var(--border);">
        <h2 style="font-size: 24px; font-weight: 600; margin-bottom: 16px; text-align: center;">Password updated</h2>
        <p style="font-size: 14px; color: var(--muted); line-height: 1.55; margin-bottom: 24px; text-align: center;">
            Your password has been set. You can log in with your new password now.
        </p>
        <div style="text-align: center;">
            <a href="{% url 'login' %}" class="btn btn-primary" style="display: inline-block;">Log in</a>
        </div>
    </div>
</div>
{% endblock %}
